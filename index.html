<script>
const mp3Data = [
    ["軽快でお洒落な電子ピアノのテクノポップス", "103.mp3"],
    ["ゆったりとしたオーケストラ楽曲", "105.mp3"],
    ["美しいピアノメロディー", "117.mp3"],
    ["落ち着いた雰囲気の大人なジャズ", "127.mp3"],
    ["神秘的で温もりのある美しいヒーリング", "146.mp3"],
    ["切なく美しいバイオリンピアノサウンド", "158.mp3"],
    ["バイオリンクラシック", "168.mp3"],
    ["水辺にいるようなヒーリング系ストリングス", "177.mp3"],
    ["お洒落なピアノシンセ", "187.mp3"],
    ["壮大で可愛らしいミュージック", "197.mp3"],
    ["大人な雰囲気のスロージャズバラード", "210.mp3"],
    ["キュートでかわいいメロディのポップス", "222.mp3"],
    ["スウィートでウォームなバラード", "235.mp3"],
    ["上品 おしゃれ ムード 穏やか 大人", "251.mp3"],
    ["苦悩をこえて、愛がかなう。ラストシーン", "399.mp3"]
];

const baseUrl = "https://life-supporter.jp/sp/hxySQ4ff/VjDWurLR/images/MP3/";
const FAVORITES_KEY = "mp3Favorites";
const itemsPerPage = 5;
let currentPage = 1;

const container = document.getElementById('mp3Container');
const paginationTop = document.getElementById('paginationTop');
const paginationBottom = document.getElementById('paginationBottom');

// お気に入りデータの読み書き
let favorites = (() => {
    try {
        const stored = localStorage.getItem(FAVORITES_KEY);
        return stored ? JSON.parse(stored) : {};
    } catch (e) { return {}; }
})();

function saveFavorites() {
    localStorage.setItem(FAVORITES_KEY, JSON.stringify(favorites));
}

// 再生制御
function handlePlayAttempt(audio, statusDiv) {
    if (audio.readyState >= 4) {
        audio.play().catch(() => {});
        statusDiv.textContent = '';
        return;
    }
    statusDiv.textContent = '⌛ 準備中...';
    audio.controls = false;
    audio.addEventListener('canplaythrough', function handler() {
        statusDiv.textContent = '✅ 再生準備完了';
        audio.controls = true;
        audio.removeEventListener('canplaythrough', handler);
        audio.play().catch(() => {
            statusDiv.textContent = '✅ 準備完了（再生ボタンを押してください）';
        });
    });
    audio.load();
}

function render() {
    container.innerHTML = '';
    const start = (currentPage - 1) * itemsPerPage;
    const end = start + itemsPerPage;
    const pageItems = mp3Data.slice(start, end);

    pageItems.forEach(([title, filename], index) => {
        const globalIndex = start + index + 1;
        const item = document.createElement('div');
        item.className = 'mp3-item';

        const content = document.createElement('div');
        content.className = 'mp3-content';
        
        const h3 = document.createElement('h3');
        h3.textContent = `${globalIndex}. ${title}`;
        
        const audio = document.createElement('audio');
        audio.controls = true;
        audio.setAttribute('controlsList', 'nodownload');
        audio.oncontextmenu = () => false;
        const source = document.createElement('source');
        source.src = baseUrl + filename;
        source.type = "audio/mpeg";
        audio.appendChild(source);

        const status = document.createElement('div');
        status.className = 'status';

        audio.addEventListener('play', () => {
            document.querySelectorAll('audio').forEach(a => {
                if (a !== audio && !a.paused) a.pause();
            });
            handlePlayAttempt(audio, status);
        });

        content.appendChild(h3);
        content.appendChild(audio);
        content.appendChild(status);

        // お気に入り
        const favBox = document.createElement('div');
        favBox.className = 'favorite-box';
        const favId = `fav-${globalIndex}`;
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.id = favId;
        checkbox.checked = !!favorites[filename];
        checkbox.onchange = (e) => {
            favorites[filename] = e.target.checked;
            saveFavorites();
        };
        const label = document.createElement('label');
        label.htmlFor = favId;

        favBox.appendChild(checkbox);
        favBox.appendChild(label);
        item.appendChild(content);
        item.appendChild(favBox);
        container.appendChild(item);
    });

    renderPagination();
}

function renderPagination() {
    const totalPages = Math.ceil(mp3Data.length / itemsPerPage);
    [paginationTop, paginationBottom].forEach(nav => {
        nav.innerHTML = '';
        
        // 前へ
        const prev = document.createElement('button');
        prev.textContent = '≪';
        prev.disabled = currentPage === 1;
        prev.onclick = () => changePage(currentPage - 1);
        nav.appendChild(prev);

        for (let i = 1; i <= totalPages; i++) {
            const btn = document.createElement('button');
            btn.textContent = i;
            if (i === currentPage) btn.classList.add('active');
            btn.onclick = () => changePage(i);
            nav.appendChild(btn);
        }

        // 次へ
        const next = document.createElement('button');
        next.textContent = '≫';
        next.disabled = currentPage === totalPages;
        next.onclick = () => changePage(currentPage + 1);
        nav.appendChild(next);
    });
}

function changePage(page) {
    currentPage = page;
    render();
    document.getElementById('mainTitle').scrollIntoView({ behavior: 'smooth' });
}

render();
</script>
